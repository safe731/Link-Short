<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkCraft Studio - All-in-One Link & HTML Hosting Platform</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel Standalone for JSX in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- QRCode JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <!-- Firebase Compatibility SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #f8fafc;
      color: #0f172a;
    }
  </style>
</head>
<body class="min-h-screen antialiased">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // --- Firebase Setup (Offline/LocalStorage Auto-Fallback) ---
    const firebaseConfig = {
      apiKey: "AIzaSyDemoKeyOnlyForAppFallback000",
      authDomain: "linkcraft-app.firebaseapp.com",
      databaseURL: "https://linkcraft-app-default-rtdb.firebaseio.com",
      projectId: "linkcraft-app",
      storageBucket: "linkcraft-app.appspot.com",
      messagingSenderId: "1000000000",
      appId: "1:1000000000:web:abcdef123456"
    };

    let db = null;
    let auth = null;
    try {
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
      db = firebase.database();
      auth = firebase.auth();
    } catch (e) {
      console.log("Firebase fallback to LocalStorage mode.");
    }

    // Storage Keys
    const STORAGE_KEY_LINKS = 'linkcraft_user_links_v2';
    const STORAGE_KEY_CLICKS = 'linkcraft_user_clicks_v2';
    const STORAGE_KEY_TOKENS = 'linkcraft_tokens_v2';

    const getLocalLinks = () => {
      try {
        const raw = localStorage.getItem(STORAGE_KEY_LINKS);
        return raw ? JSON.parse(raw) : [];
      } catch (e) { return []; }
    };

    const saveLocalLinks = (links) => {
      try {
        localStorage.setItem(STORAGE_KEY_LINKS, JSON.stringify(links));
      } catch (e) {}
    };

    const getLocalClicks = () => {
      try {
        const raw = localStorage.getItem(STORAGE_KEY_CLICKS);
        return raw ? JSON.parse(raw) : [];
      } catch (e) { return []; }
    };

    const saveLocalClicks = (clicks) => {
      try {
        localStorage.setItem(STORAGE_KEY_CLICKS, JSON.stringify(clicks));
      } catch (e) {}
    };

    const getLocalTokens = () => {
      try {
        const val = localStorage.getItem(STORAGE_KEY_TOKENS);
        return val ? parseInt(val, 10) : 50;
      } catch (e) { return 50; }
    };

    const saveLocalTokens = (tokens) => {
      try {
        localStorage.setItem(STORAGE_KEY_TOKENS, tokens.toString());
      } catch (e) {}
    };

    const generateID = () => Math.random().toString(36).substring(2, 8);

    const DEFAULT_INITIAL_LINKS = [
      {
        id: 'demo12',
        type: 'html',
        title: 'Portfolio Showcase Landing',
        htmlContent: '<div style="padding: 40px; text-align: center; font-family: sans-serif;"><h1>🚀 Welcome to My Web Studio</h1><p>Hosted via LinkCraft Studio!</p></div>',
        userId: 'demo',
        createdAt: Date.now() - 86400000 * 2,
        clicks: 42,
        active: true
      },
      {
        id: 'short1',
        type: 'short',
        title: 'Special Coupon Link',
        originalUrl: 'https://google.com',
        userId: 'demo',
        createdAt: Date.now() - 86400000 * 5,
        clicks: 128,
        active: true
      }
    ];

    // Main App Component
    function App() {
      const [routeType, setRouteType] = useState(null);
      const [routeTargetId, setRouteTargetId] = useState(null);

      const [activeTab, setActiveTab] = useState('tools'); // tools | mylinks | analytics
      const [activeTool, setActiveTool] = useState('html'); // html | short | multipage | unlock
      const [user, setUser] = useState(null);
      const [tokens, setTokens] = useState(50);
      const [userLinks, setUserLinks] = useState([]);
      const [clickLogs, setClickLogs] = useState([]);

      const [isAuthOpen, setIsAuthOpen] = useState(false);
      const [isTokenModalOpen, setIsTokenModalOpen] = useState(false);
      const [qrModalData, setQrModalData] = useState(null);
      const [editingLink, setEditingLink] = useState(null);
      const [analyticsSelectedLinkId, setAnalyticsSelectedLinkId] = useState(null);
      const [toasts, setToasts] = useState([]);

      const addToast = (message, type = 'info') => {
        const id = Math.random().toString(36).substring(2, 9);
        setToasts((prev) => [...prev, { id, message, type }]);
        setTimeout(() => {
          setToasts((prev) => prev.filter((t) => t.id !== id));
        }, 4000);
      };

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        if (params.has('site')) {
          setRouteType('site');
          setRouteTargetId(params.get('site'));
        } else if (params.has('s')) {
          setRouteType('short');
          setRouteTargetId(params.get('s'));
        } else if (params.has('m')) {
          setRouteType('multipage');
          setRouteTargetId(params.get('m'));
        } else if (params.has('unlock')) {
          setRouteType('unlock');
          setRouteTargetId(params.get('unlock'));
        }
      }, []);

      useEffect(() => {
        let loaded = getLocalLinks();
        if (loaded.length === 0) {
          loaded = DEFAULT_INITIAL_LINKS;
          saveLocalLinks(loaded);
        }
        setUserLinks(loaded);
        setClickLogs(getLocalClicks());
        setTokens(getLocalTokens());
      }, []);

      const deductToken = async () => {
        if (tokens <= 0) {
          addToast('টোকেন শেষ হয়ে গেছে! অনুগ্রহ করে রিচার্জ করুন।', 'error');
          setIsTokenModalOpen(true);
          return false;
        }
        const newTokens = tokens - 1;
        setTokens(newTokens);
        saveLocalTokens(newTokens);
        return true;
      };

      const getBaseUrl = () => window.location.origin + window.location.pathname;

      const logClick = (linkId, linkType) => {
        const devices = ['Desktop', 'Mobile', 'Tablet'];
        const referrers = ['YouTube', 'Facebook', 'Direct', 'WhatsApp', 'Google'];
        const countries = ['Bangladesh 🇧🇩', 'India 🇮🇳', 'USA 🇺🇸', 'UK 🇬🇧'];

        const newClick = {
          id: generateID(),
          linkId,
          linkType,
          timestamp: Date.now(),
          device: devices[Math.floor(Math.random() * devices.length)],
          referrer: referrers[Math.floor(Math.random() * referrers.length)],
          country: countries[Math.floor(Math.random() * countries.length)],
        };

        const updatedLogs = [newClick, ...clickLogs];
        setClickLogs(updatedLogs);
        saveLocalClicks(updatedLogs);

        const updatedLinks = userLinks.map(l => l.id === linkId ? { ...l, clicks: (l.clicks || 0) + 1 } : l);
        setUserLinks(updatedLinks);
        saveLocalLinks(updatedLinks);
      };

      const handlePublishHtml = async (html, title) => {
        if (!(await deductToken())) return null;
        const id = generateID();
        const newLink = {
          id,
          type: 'html',
          title: title || 'HTML Hosted Page',
          htmlContent: html,
          userId: user ? user.uid : 'guest',
          createdAt: Date.now(),
          clicks: 0,
          active: true
        };
        const updated = [newLink, ...userLinks];
        setUserLinks(updated);
        saveLocalLinks(updated);
        addToast('HTML পৃষ্ঠা সফলভাবে প্রকাশিত হয়েছে!', 'success');
        return `${getBaseUrl()}?site=${id}`;
      };

      const handleCreateShort = async (targetUrl, title, customAlias) => {
        if (!(await deductToken())) return null;
        const id = customAlias && customAlias.trim() !== '' ? customAlias.trim().toLowerCase() : generateID();
        const newLink = {
          id,
          type: 'short',
          title: title || 'Short Link',
          originalUrl: targetUrl,
          userId: user ? user.uid : 'guest',
          createdAt: Date.now(),
          clicks: 0,
          active: true
        };
        const updated = [newLink, ...userLinks];
        setUserLinks(updated);
        saveLocalLinks(updated);
        addToast('শর্ট লিঙ্ক তৈরি সম্পন্ন হয়েছে!', 'success');
        return `${getBaseUrl()}?s=${id}`;
      };

      const handleCreateMultiPage = async (targetUrl, title) => {
        if (!(await deductToken())) return null;
        const id = generateID();
        const newLink = {
          id,
          type: 'multipage',
          title: title || 'Monetized 3-Page Link',
          originalUrl: targetUrl,
          userId: user ? user.uid : 'guest',
          createdAt: Date.now(),
          clicks: 0,
          active: true
        };
        const updated = [newLink, ...userLinks];
        setUserLinks(updated);
        saveLocalLinks(updated);
        addToast('৩-ধাপের মনিটাইজড লিঙ্ক তৈরি হয়েছে!', 'success');
        return `${getBaseUrl()}?m=${id}`;
      };

      const handleCreateUnlock = async (targetUrl, title, steps) => {
        if (!(await deductToken())) return null;
        const id = generateID();
        const newLink = {
          id,
          type: 'unlock',
          title: title || 'Follow-to-Unlock Gate',
          originalUrl: targetUrl,
          requiredSteps: steps,
          userId: user ? user.uid : 'guest',
          createdAt: Date.now(),
          clicks: 0,
          active: true
        };
        const updated = [newLink, ...userLinks];
        setUserLinks(updated);
        saveLocalLinks(updated);
        addToast('সুব৪সুব আনলক গেট লিঙ্ক তৈরি হয়েছে!', 'success');
        return `${getBaseUrl()}?unlock=${id}`;
      };

      const handleToggleActive = (id) => {
        const updated = userLinks.map(l => l.id === id ? { ...l, active: !l.active } : l);
        setUserLinks(updated);
        saveLocalLinks(updated);
        addToast('লিঙ্কের স্ট্যাটাস পরিবর্তন হয়েছে', 'info');
      };

      const handleDeleteLink = (id) => {
        if (confirm('আপনি কি সত্যিই এই লিঙ্কটি মুছে ফেলতে চান?')) {
          const updated = userLinks.filter(l => l.id !== id);
          setUserLinks(updated);
          saveLocalLinks(updated);
          addToast('লিঙ্কটি মুছে ফেলা হয়েছে', 'success');
        }
      };

      const handleSaveEdit = (updatedLink) => {
        const updated = userLinks.map(l => l.id === updatedLink.id ? updatedLink : l);
        setUserLinks(updated);
        saveLocalLinks(updated);
        setEditingLink(null);
        addToast('লিঙ্ক আপডেট সম্পন্ন হয়েছে!', 'success');
      };

      if (routeType && routeTargetId) {
        const targetItem = userLinks.find(l => l.id === routeTargetId);
        return (
          <PublicOverlay 
            routeType={routeType} 
            targetId={routeTargetId} 
            linkItem={targetItem} 
            onLogClick={(id, type) => logClick(id, type)}
            onGoHome={() => window.location.href = window.location.pathname}
          />
        );
      }

      return (
        <div class="min-h-screen flex flex-col bg-slate-50">
          <div class="fixed top-5 right-5 z-50 flex flex-col gap-2 pointer-events-none">
            {toasts.map(t => (
              <div key={t.id} class={`pointer-events-auto px-4 py-3 rounded-xl shadow-lg border text-sm font-semibold flex items-center gap-2 ${
                t.type === 'success' ? 'bg-emerald-50 text-emerald-800 border-emerald-200' :
                t.type === 'error' ? 'bg-rose-50 text-rose-800 border-rose-200' :
                'bg-blue-50 text-blue-800 border-blue-200'
              }`}>
                <span>{t.type === 'success' ? '✅' : t.type === 'error' ? '❌' : 'ℹ️'}</span>
                <span>{t.message}</span>
              </div>
            ))}
          </div>

          <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-600 to-violet-500 flex items-center justify-center text-white font-black text-xl shadow-md">⚡</div>
                <div>
                  <h1 class="font-extrabold text-lg text-slate-900 leading-tight">LinkCraft Studio</h1>
                  <p class="text-xs text-slate-500 font-medium">All-in-One Link & Hosting Platform</p>
                </div>
              </div>

              <nav class="hidden md:flex items-center gap-1 bg-slate-100 p-1 rounded-xl border border-slate-200">
                <button onClick={() => setActiveTab('tools')} class={`px-4 py-2 text-sm font-bold rounded-lg transition-all ${activeTab === 'tools' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-600'}`}>🛠️ টুলস</button>
                <button onClick={() => setActiveTab('mylinks')} class={`px-4 py-2 text-sm font-bold rounded-lg transition-all ${activeTab === 'mylinks' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-600'}`}>🔗 মাই লিঙ্কস ({userLinks.length})</button>
                <button onClick={() => setActiveTab('analytics')} class={`px-4 py-2 text-sm font-bold rounded-lg transition-all ${activeTab === 'analytics' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-600'}`}>📊 অ্যানালিটিক্স</button>
              </nav>

              <div class="flex items-center gap-3">
                <div class="flex items-center gap-2 bg-indigo-50 border border-indigo-200 text-indigo-700 px-3 py-1.5 rounded-xl text-sm font-bold">
                  <span>⚡ {tokens} টোকেন</span>
                  <button onClick={() => setIsTokenModalOpen(true)} class="bg-indigo-600 text-white text-xs px-2 py-0.5 rounded-md">+ ফ্রি</button>
                </div>
                {user ? (
                  <button onClick={() => setUser(null)} class="text-xs text-slate-600 border px-3 py-1.5 rounded-xl font-semibold">লগআউট</button>
                ) : (
                  <button onClick={() => setIsAuthOpen(true)} class="bg-slate-900 text-white text-xs px-3.5 py-1.5 rounded-xl font-semibold">লগইন</button>
                )}
              </div>
            </div>
          </header>

          <main class="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6 lg:p-8">
            {activeTab === 'tools' && (
              <ToolsView 
                activeTool={activeTool} setActiveTool={setActiveTool}
                onPublishHtml={handlePublishHtml} onCreateShort={handleCreateShort}
                onCreateMultiPage={handleCreateMultiPage} onCreateUnlock={handleCreateUnlock}
                onShowQR={(url, title) => setQrModalData({ url, title })}
              />
            )}
            {activeTab === 'mylinks' && (
              <MyLinksView 
                links={userLinks} onToggleActive={handleToggleActive} onDelete={handleDeleteLink}
                onEdit={(link) => setEditingLink(link)} onShowQR={(url, title) => setQrModalData({ url, title })}
                onViewAnalytics={(id) => { setAnalyticsSelectedLinkId(id); setActiveTab('analytics'); }}
              />
            )}
            {activeTab === 'analytics' && (
              <AnalyticsView 
                links={userLinks} clickLogs={clickLogs}
                selectedLinkId={analyticsSelectedLinkId} setSelectedLinkId={setAnalyticsSelectedLinkId}
              />
            )}
          </main>

          {isAuthOpen && <AuthModal onClose={() => setIsAuthOpen(false)} onLogin={(email) => { setUser({ uid: 'usr_' + Date.now(), email }); setIsAuthOpen(false); addToast('লগইন সফল!', 'success'); }} />}
          {isTokenModalOpen && <TokenModal onClose={() => setIsTokenModalOpen(false)} onClaim={() => { setTokens(tokens + 50); saveLocalTokens(tokens + 50); setIsTokenModalOpen(false); addToast('৫০ ফ্রি টোকেন যোগ হয়েছে!', 'success'); }} />}
          {qrModalData && <QrModal data={qrModalData} onClose={() => setQrModalData(null)} />}
          {editingLink && <EditLinkModal link={editingLink} onClose={() => setEditingLink(null)} onSave={handleSaveEdit} />}
        </div>
      );
    }

    function ToolsView({ activeTool, setActiveTool, onPublishHtml, onCreateShort, onCreateMultiPage, onCreateUnlock, onShowQR }) {
      const [generatedUrl, setGeneratedUrl] = useState('');
      const [htmlCode, setHtmlCode] = useState('<h1>Welcome to My Live Page!</h1>');
      const [htmlTitle, setHtmlTitle] = useState('');
      const [shortUrl, setShortUrl] = useState('');
      const [shortAlias, setShortAlias] = useState('');
      const [multiUrl, setMultiUrl] = useState('');
      const [unlockUrl, setUnlockUrl] = useState('');
      const [unlockSteps, setUnlockSteps] = useState([{ id: '1', title: 'YouTube Subscribe', url: 'https://youtube.com' }]);

      return (
        <div class="space-y-6">
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            {[
              { id: 'html', icon: '💻', title: 'HTML হোস্টিং' },
              { id: 'short', icon: '🔗', title: 'ইউআরএল শর্টনার' },
              { id: 'multipage', icon: '💰', title: '৩-ধাপের মনিটাইজড লিঙ্ক' },
              { id: 'unlock', icon: '🔒', title: 'সুব৪সুব আনলক গেট' }
            ].map(t => (
              <button key={t.id} onClick={() => { setActiveTool(t.id); setGeneratedUrl(''); }} class={`p-4 rounded-2xl border text-left font-bold ${activeTool === t.id ? 'bg-indigo-600 text-white' : 'bg-white text-slate-800'}`}>
                <div>{t.icon}</div>
                <div class="text-sm mt-1">{t.title}</div>
              </button>
            ))}
          </div>

          {generatedUrl && (
            <div class="p-4 bg-emerald-50 border border-emerald-200 rounded-2xl flex items-center justify-between">
              <span class="font-mono text-xs font-bold text-emerald-900 break-all">{generatedUrl}</span>
              <button onClick={() => { navigator.clipboard.writeText(generatedUrl); alert('কপি করা হয়েছে!'); }} class="px-3 py-1.5 bg-emerald-600 text-white rounded-xl text-xs font-bold">📋 কপি</button>
            </div>
          )}

          {activeTool === 'html' && (
            <div class="bg-white p-6 rounded-2xl border space-y-3">
              <h3 class="font-bold">💻 HTML হোস্টিং স্টুডিও</h3>
              <textarea rows="6" value={htmlCode} onChange={e => setHtmlCode(e.target.value)} class="w-full p-3 font-mono text-xs border rounded-xl bg-slate-900 text-slate-100"></textarea>
              <button onClick={async () => { const res = await onPublishHtml(htmlCode, htmlTitle); if (res) setGeneratedUrl(res); }} class="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl text-sm">🚀 পাবলিশ করুন (১ টোকেন)</button>
            </div>
          )}

          {activeTool === 'short' && (
            <div class="bg-white p-6 rounded-2xl border space-y-3">
              <h3 class="font-bold">🔗 ইউআরএল শর্টনার</h3>
              <input type="url" placeholder="https://..." value={shortUrl} onChange={e => setShortUrl(e.target.value)} class="w-full p-2.5 border rounded-xl text-sm" />
              <button onClick={async () => { const res = await onCreateShort(shortUrl, '', shortAlias); if (res) setGeneratedUrl(res); }} class="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl text-sm">🔗 ছোট করুন (১ টোকেন)</button>
            </div>
          )}

          {activeTool === 'multipage' && (
            <div class="bg-white p-6 rounded-2xl border space-y-3">
              <h3 class="font-bold">💰 ৩-ধাপের মনিটাইজড লিঙ্ক</h3>
              <input type="url" placeholder="ফাইনাল লিঙ্ক..." value={multiUrl} onChange={e => setMultiUrl(e.target.value)} class="w-full p-2.5 border rounded-xl text-sm" />
              <button onClick={async () => { const res = await onCreateMultiPage(multiUrl, ''); if (res) setGeneratedUrl(res); }} class="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl text-sm">✨ লিঙ্ক তৈরি করুন (১ টোকেন)</button>
            </div>
          )}

          {activeTool === 'unlock' && (
            <div class="bg-white p-6 rounded-2xl border space-y-3">
              <h3 class="font-bold">🔒 সুব৪সুব ফলো-টু-আনলক গেট</h3>
              <input type="url" placeholder="ফাইনাল লিঙ্ক..." value={unlockUrl} onChange={e => setUnlockUrl(e.target.value)} class="w-full p-2.5 border rounded-xl text-sm" />
              <button onClick={async () => { const res = await onCreateUnlock(unlockUrl, '', unlockSteps); if (res) setGeneratedUrl(res); }} class="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl text-sm">🔒 গেট তৈরি করুন (১ টোকেন)</button>
            </div>
          )}
        </div>
      );
    }

    function MyLinksView({ links, onToggleActive, onDelete, onEdit, onShowQR, onViewAnalytics }) {
      return (
        <div class="space-y-4">
          <h2 class="text-lg font-bold">🔗 মাই লিঙ্কস ({links.length})</h2>
          {links.map(link => (
            <div key={link.id} class="p-4 bg-white border rounded-2xl flex flex-col md:flex-row items-start md:items-center justify-between gap-3">
              <div>
                <span class="text-[10px] font-black uppercase px-2 py-0.5 bg-slate-100 rounded">{link.type}</span>
                <h3 class="font-bold text-sm text-slate-900 mt-1">{link.title || 'Untitled'}</h3>
                <p class="text-xs font-mono text-indigo-600">{link.id}</p>
              </div>
              <div class="flex items-center gap-2">
                <button onClick={() => onViewAnalytics(link.id)} class="px-3 py-1.5 bg-indigo-50 text-indigo-700 font-bold text-xs rounded-lg">📊 অ্যানালিটিক্স</button>
                <button onClick={() => onDelete(link.id)} class="px-3 py-1.5 bg-rose-50 text-rose-700 font-bold text-xs rounded-lg">🗑️ মুছুন</button>
              </div>
            </div>
          ))}
        </div>
      );
    }

    function AnalyticsView({ links, clickLogs, selectedLinkId }) {
      const totalClicks = links.reduce((a, b) => a + (b.clicks || 0), 0);
      return (
        <div class="space-y-4">
          <h2 class="text-lg font-bold">📊 অ্যানালিটিক্স ওভারভিউ</h2>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white p-4 rounded-2xl border"><span class="text-xs text-slate-400 font-bold">মোট ক্লিক</span><p class="text-2xl font-black text-indigo-600">{totalClicks}</p></div>
            <div class="bg-white p-4 rounded-2xl border"><span class="text-xs text-slate-400 font-bold">মোট লিঙ্ক</span><p class="text-2xl font-black text-emerald-600">{links.length}</p></div>
          </div>
        </div>
      );
    }

    function PublicOverlay({ routeType, targetId, linkItem, onLogClick, onGoHome }) {
      useEffect(() => { onLogClick(targetId, routeType); }, []);

      if (routeType === 'site') {
        return (
          <div class="min-h-screen flex flex-col bg-slate-900">
            <button onClick={onGoHome} class="p-2 text-white text-xs bg-slate-800 text-right">🏠 হোমে যান</button>
            <iframe srcDoc={linkItem ? linkItem.htmlContent : ''} class="w-full flex-1 border-0" />
          </div>
        );
      }

      return (
        <div class="min-h-screen bg-slate-950 text-white flex flex-col items-center justify-center p-6">
          <h2 class="text-xl font-bold">রিডাইরেক্ট করা হচ্ছে...</h2>
          <a href={linkItem?.originalUrl} class="mt-4 px-6 py-3 bg-indigo-600 rounded-2xl font-bold text-sm">সরাসরি যান 🚀</a>
        </div>
      );
    }

    function AuthModal({ onClose, onLogin }) {
      const [email, setEmail] = useState('');
      return (
        <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4">
          <div class="bg-white p-6 rounded-2xl max-w-sm w-full space-y-3">
            <h3 class="font-bold">লগইন</h3>
            <input type="email" placeholder="ইমেইল..." value={email} onChange={e => setEmail(e.target.value)} class="w-full p-2 border rounded-xl text-sm" />
            <button onClick={() => onLogin(email)} class="w-full py-2 bg-indigo-600 text-white font-bold rounded-xl text-sm">প্রবেশ করুন</button>
          </div>
        </div>
      );
    }

    function TokenModal({ onClose, onClaim }) {
      return (
        <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4">
          <div class="bg-white p-6 rounded-2xl max-w-sm w-full text-center space-y-3">
            <h3 class="font-bold">🎁 ৫০ ফ্রি টোকেন</h3>
            <button onClick={onClaim} class="w-full py-2 bg-indigo-600 text-white font-bold rounded-xl text-sm">সংগ্রহ করুন</button>
          </div>
        </div>
      );
    }

    function QrModal({ data, onClose }) {
      return (
        <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4">
          <div class="bg-white p-6 rounded-2xl max-w-sm w-full text-center space-y-3">
            <h3 class="font-bold">{data.title}</h3>
            <p class="font-mono text-xs break-all">{data.url}</p>
            <button onClick={onClose} class="w-full py-2 bg-slate-900 text-white text-xs font-bold rounded-xl">বন্ধ করুন</button>
          </div>
        </div>
      );
    }

    function EditLinkModal({ link, onClose, onSave }) {
      const [title, setTitle] = useState(link.title || '');
      return (
        <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4">
          <div class="bg-white p-6 rounded-2xl max-w-sm w-full space-y-3">
            <h3 class="font-bold">এডিট করুন</h3>
            <input type="text" value={title} onChange={e => setTitle(e.target.value)} class="w-full p-2 border rounded-xl text-sm" />
            <button onClick={() => onSave({ ...link, title })} class="w-full py-2 bg-indigo-600 text-white font-bold rounded-xl text-sm">সেভ করুন</button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
